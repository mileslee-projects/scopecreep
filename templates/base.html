<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScopeCreep</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9fafb; color: #111827; }
    nav { background: #111827; padding: 0 24px; display: flex; align-items: center; gap: 24px; height: 52px; }
    nav a { color: #9ca3af; text-decoration: none; font-size: 14px; }
    nav a:hover, nav a.active { color: white; }
    nav .brand { color: white; font-weight: 700; font-size: 16px; margin-right: 16px; }
    .container { max-width: 800px; margin: 40px auto; padding: 0 24px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 24px; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .card { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 24px; margin-bottom: 16px; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #374151; }
    input[type=text], input[type=email], input[type=number], textarea {
      width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 14px; margin-bottom: 16px; font-family: inherit;
    }
    textarea { min-height: 160px; resize: vertical; }
    input[type=checkbox] { margin-right: 8px; }
    .btn { display: inline-block; padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; text-decoration: none; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
    .btn-secondary:hover { background: #e5e7eb; }
    .flash { background: #ecfdf5; border: 1px solid #6ee7b7; color: #065f46; padding: 12px 16px; border-radius: 6px; margin-bottom: 24px; font-size: 14px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 500; }
    .badge-pending  { background: #fef3c7; color: #92400e; }
    .badge-approved { background: #d1fae5; color: #065f46; }
    .badge-declined { background: #fee2e2; color: #991b1b; }
    .badge-paid     { background: #dbeafe; color: #1e40af; }
    .verdict-creep  { background: #fee2e2; border: 1px solid #fca5a5; border-radius: 6px; padding: 16px; margin-top: 16px; }
    .verdict-ok     { background: #d1fae5; border: 1px solid #6ee7b7; border-radius: 6px; padding: 16px; margin-top: 16px; }
    .verdict-unclear{ background: #fef3c7; border: 1px solid #fcd34d; border-radius: 6px; padding: 16px; margin-top: 16px; }
    .muted { color: #6b7280; font-size: 13px; }
    .row { display: flex; gap: 16px; }
    .row > * { flex: 1; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">ScopeCreep</span>
    <a href="/">Dashboard</a>
    <a href="/sow">Load SOW</a>
    <a href="/check">Check Request</a>
    <a href="/new-order">New Change Order</a>
    <a href="/gmail">Gmail Scan</a>
  </nav>
  <div class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
